<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stallarbeit App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="menuToggle" class="menu-toggle" aria-label="Menü öffnen">☰</button>
    <h1>Stallarbeit</h1>
    <div id="sessionInfo"></div>
  </header>

  <div class="layout">
    <aside id="menu" class="menu">
      <nav>
        <button class="menu-item" data-view="anmeldung">Anmeldung</button>
        <button class="menu-item danger" data-view="notfall">Notfall</button>
      </nav>
    </aside>

    <main id="content" class="content"></main>
  </div>

  <template id="loginTemplate">
    <section class="card">
      <h2>Anmeldung</h2>
      <p>Demo-Zugänge:</p>
      <ul>
        <li>Manager: <code>manager1</code>, <code>manager2</code>, <code>manager3</code> (Passwort: <code>stall123</code>)</li>
        <li>Mitarbeiter: <code>mitarbeiter1</code>, <code>mitarbeiter2</code> (Passwort: <code>stall123</code>)</li>
      </ul>
      <form id="loginForm" class="form-grid">
        <label>Benutzername <input required name="username" /></label>
        <label>Passwort <input required type="password" name="password" /></label>
        <button type="submit">Anmelden</button>
      </form>
    </section>
  </template>

  <template id="tasksTemplate">
    <section class="card">
      <h2 id="tasksTitle"></h2>
      <div id="managerCreateArea"></div>
      <ul id="taskList" class="list"></ul>
    </section>
  </template>

  <template id="mitarbeiterTemplate">
    <section class="card">
      <h2>Mitarbeiter</h2>
      <ul id="userList" class="list"></ul>
      <div id="employeeAdminArea"></div>
    </section>
  </template>

  <template id="notfallTemplate">
    <section class="card">
      <h2>Notfall</h2>
      <p>Bei einem Notfall sofort drücken:</p>
      <button id="emergencyButton" class="danger">🚨 Tierarzt anrufen & Manager informieren</button>
      <h3>Notfall-Protokoll</h3>
      <ul id="emergencyLog" class="list"></ul>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
